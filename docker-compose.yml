version: "3.8"

services:
  mariadb:
    image: mariadb:11
    container_name: parver-db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: parver
      MARIADB_USER: parver
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - parver-data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped

  parver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parver-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=parver
      - DB_USERNAME=parver
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mariadb
    restart: unless-stopped

volumes:
  parver-data:
