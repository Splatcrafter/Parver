openapi: 3.0.3
info:
  title: ParVer API
  description: REST API for the ParVer parking management system
  version: 0.1.0
  contact:
    name: Splatgames Software
servers:
  - url: /api
    description: Default server (relative path)

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check endpoint
      tags:
        - system
      responses:
        '200':
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /parking-spaces:
    get:
      operationId: getParkingSpaces
      summary: Get all parking spaces
      tags:
        - parking
      responses:
        '200':
          description: List of parking spaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingSpace'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - timestamp

    ParkingSpace:
      type: object
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
          example: "A-01"
        occupied:
          type: boolean
          example: false
      required:
        - id
        - label
        - occupied
